global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: payshield-backend
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["payshield-backend:3001"]

  - job_name: payshield-ml-engine
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["payshield-ml-engine:8000"]

  - job_name: observability-brain
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["observability-brain:9000"]
